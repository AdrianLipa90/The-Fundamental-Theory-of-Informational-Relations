axioms:
  - id: AX-001
    name: Projective State Primacy
    status: axiom
    summary: Physical states are phase-equivalence classes in projective space.
  - id: AX-002
    name: Boundary Locality and Primitive Closure
    status: axiom
    summary: A stable boundary of distinguishability induces locality and primitive local closure before holonomy or memory enter the formalism.
  - id: AX-003
    name: Primitive Relational Preference and Ordered Phase Motion
    status: axiom
    summary: Nonzero primitive relational preference breaks isotropy and induces ordered local phase rotation on the first projective sphere.
  - id: AX-004
    name: Discrete Arithmetic Seed
    status: axiom
    summary: Arithmetic seeds provide admissible initial structure for spectral generation.
  - id: AX-005
    name: Constants from Closure
    status: axiom
    summary: Fundamental constants are invariants of arithmetic-geometric closure.

  - id: AX-0100
    name: Canonical Relational-Phase Postulates
    status: axiom_bridge
    summary: Repo-level bilingual postulate canon linking ontology, emergence, holonomic coupling, memory, and deformation cost.
