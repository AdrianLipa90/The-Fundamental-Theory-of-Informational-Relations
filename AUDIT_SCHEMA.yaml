schema_id: AUDIT-SCHEMA-0001
status: defined
scope: runtime and post-hoc reporting for semantic action and distortion channels
required_fields:
  S_online: float
  S_full: float
  L_sem: float
  Delta_phi: float
  D_rel_holonomic: float
  D_rel_resonance: float
  Pi_truth_struct: float
  Pi_truth_audit: float
  distortion_channels:
    false: float
    unmarked: float
    omit: float
    hall: float
    smooth: float
  verdict: string
verdict_enum:
  - accept
  - revise
  - reject
rules:
  - all scalar cost fields must be nonnegative
  - verdict must be one of accept|revise|reject
  - S_full should equal S_online plus audit contribution when audit is applied
