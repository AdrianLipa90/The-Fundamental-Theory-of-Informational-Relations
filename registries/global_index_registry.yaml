repository: AdrianLipa90/The-Fundamental-Theory-of-Informational-Relations
branch: main
agent: canonical_main
role: root_index_authority
status: defined

index_authority:
  public_entrypoint:
    path: README.md
    role: public_project_entrypoint
    canonical: true
  root_governance_index:
    path: INDEX.md
    role: human_readable_root_governance
    canonical: true
  root_navigation_spine:
    path: index.md
    role: human_readable_global_navigation
    canonical: true
  machine_registry:
    path: registries/global_index_registry.yaml
    role: machine_readable_root_authority
    canonical: true
  active_cross_reference_registry:
    path: registries/global_cross_reference_map.yaml
    role: active_foundations_cross_reference_spine
    canonical: true
  legacy_cross_reference_registry:
    path: registries/cross_reference_map.yaml
    role: legacy_or_imported_topology_map
    canonical: true
  orchestration_layer:
    path: systems/CIEL_FOUNDATIONS/ORCHESTRATOR.md
    role: human_readable_active_module_router
    canonical: true
  agent_authority_registry:
    path: registries/agent_authority_registry.yaml
    role: canonical_agent_file_authority
    canonical: true
  bibliography_readme:
    path: bibliography/README.md
    role: human_readable_bibliography_entrypoint
    canonical: true
  bibliography_seed:
    path: bibliography/foundations_seed.bib
    role: machine_readable_seed_bibliography
    canonical: true

status_vocabularies:
  canonical_status:
    - canonical
    - draft
    - auxiliary
    - deprecated
  epistemic_status:
    - asserted
    - defined
    - derived
    - hypothesis
    - imported
    - translated
    - auxiliary

relation_types:
  - upstream
  - downstream
  - couples_to
  - exports_to
  - mirrors
  - surface_for
  - governs
  - indexes
  - registers
  - routes_to
  - cites

policy:
  single_source_of_truth_rule: true
  no_downstream_without_upstream_anchor: true
  no_parallel_root_authority_without_registry_record: true
  registry_required_before_stable_export: true
  bibliography_seed_must_not_override_formal_status: true
  auxiliary_agent_files_must_not_override_root_agent: true

tracked_root_objects:
  - id: DOC-GLO-0001
    name: public_entrypoint
    path: README.md
    class: native
    layer: root_doc
    canonical_status: canonical
    epistemic_status: asserted
    relations:
      routes_to:
        - IDX-GLO-0001
        - IDX-GLO-0002
        - ORCH-GLO-0001

  - id: IDX-GLO-0001
    name: root_governance_index
    path: INDEX.md
    class: native
    layer: meta_index
    canonical_status: canonical
    epistemic_status: asserted
    relations:
      governs:
        - IDX-GLO-0002
        - REG-GLO-0001
        - REG-GLO-XREF-0001

  - id: IDX-GLO-0002
