interface:
  id: IF-SEC-0001
  name: sector_inheritance_contract
  required_sector_fields:
    - imported_constants
    - imported_operators
    - imported_constraints
    - sector_assumptions
    - falsification_target
    - whitepaper_target
  rules:
    - no sector may redefine a canonical constant locally
    - no sector may redefine a canonical operator locally
    - all imports must point upstream to a canonical path or interface ID
    - every sector must expose an explicit dependency surface
