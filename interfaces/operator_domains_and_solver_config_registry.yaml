version: 1
role: operator_domains_and_solver_config_registry
records:
  - id: DOM-UPL-0001
    name: spacetime_R4_domain
    source_anchor: SRC-UPL-0003
    domain: R4
    operators: [gradient, Laplacian, dAlembert]
    function_spaces: [L2_R4, H1_R4, H2_R4]
    boundary_conditions: [Dirichlet_at_infinity, exponential_decay]

  - id: DOM-UPL-0002
    name: Kahler_S2_domain
    source_anchor: SRC-UPL-0003
    domain: S2
    operators: [Fubini_Study_metric, Laplace_Beltrami]
    function_spaces: [L2_S2, H1_S2, H2_S2]
    boundary_conditions: [periodic, compact_Kahler]

  - id: DOM-UPL-0003
    name: graph_semantic_domain
    source_anchor: SRC-UPL-0003
    domain: graph_G
    operators: [graph_Laplacian]
    function_spaces: [L2_V]
    boundary_conditions: [Dirichlet_graph, Neumann_graph, Robin_graph]

  - id: DOM-UPL-0004
    name: phase_unwrap_algorithm
    source_anchor: SRC-UPL-0003
    domain: contour_phase_data
    operators: [phase_unwrap, winding_integrality]
    boundary_conditions: [continuity_mod_2pi]
    notes: support object for topological charge consistency

  - id: IC-UPL-0001
    name: uploaded_initial_conditions_suite
    source_anchor: SRC-UPL-0003
    initial_fields: [Psi0, S0, I0_perturbed, Sigma0, Omega0, tau0]
    requirements: [L2_normalization, bounded_Omega, monotonic_tau]

  - id: CFG-UPL-0001
    name: uploaded_solver_grid_config
    source_anchor: SRC-UPL-0003
    grid_parameters: [NxNyNz_64_256, Nt_1000_10000, dt_1e-4_1e-3, domain_length_10_100]
    convergence_criterion: relative_L2_change_below_1e-8
    downstream_targets: [numerical_solver, tests]

  - id: CFG-UPL-0002
    name: uploaded_solver_architecture
    source_anchor: SRC-UPL-0004
    solver_steps:
      - solve_Psi_S
      - solve_I_wave
      - update_Sigma
      - advance_Omega
      - update_tau
      - compute_emergent_mass
      - optional_GR_backreaction
    downstream_targets: [implementation_planning, integration_tests]
