      allowed_downstream_use: calibrated_small_coupling
      registry_ref: ../registries/metatime_status.yaml#intention_operator_I0
    - name: heavy_quark_kappa
      value: 93.83
      status: fitted
      allowed_downstream_use: calibrated_mass_map
      registry_ref: ../registries/metatime_status.yaml#heavy_quark_closure
