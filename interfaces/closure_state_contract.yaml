interface:
  id: IF-CLS-0001
  name: closure_state_contract
  upstream:
    - AX-FND-0002
    - DEF-FND-0003
    - DEF-FND-0004
  required_inputs:
    - state_id
    - phase_data
    - boundary_context
    - locality_context
  required_outputs:
    - closure_status
    - admissibility_flag
    - rollback_or_acceptance_signal
    - diagnostics
  rule: no closure implementation may emit acceptance without explicit diagnostics
